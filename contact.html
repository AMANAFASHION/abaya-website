}

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Abaya Store</a>

<!-- Contact Section -->
<div class="container mt-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="mb-3">
        <h5>Phone:</h5>
        <p>0712345678</p>
      </div>

        <p>abayastore@gmail.com</p>
      </div>
